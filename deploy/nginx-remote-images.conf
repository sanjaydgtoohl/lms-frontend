# Optional nginx snippet for live server image proxy (alternative to service worker).
# Place inside your server { } block for www.dev.lms.dgtoohl.com

location /remote-images/ {
    proxy_pass https://d2nljoxssb7y4b.cloudfront.net/;
    proxy_ssl_server_name on;
    proxy_set_header Host d2nljoxssb7y4b.cloudfront.net;
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Cache-Control "public, max-age=86400";
}
